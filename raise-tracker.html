<title>RAISE 2.0 RPOC Tracker — SRE Platform</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #38bdf8;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --orange: #fb923c;
    --purple: #a78bfa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* --- Top Bar --- */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .back-btn {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--surface-hover); color: var(--text);
    font-size: 18px; text-decoration: none; transition: all 0.15s;
    border: 1px solid var(--border); flex-shrink: 0;
  }
  .back-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); text-decoration: none; }
  .topbar h1 { font-size: 18px; font-weight: 600; }
  .topbar h1 span { color: var(--accent); }
  .topbar-stats {
    display: flex;
    gap: 24px;
    font-size: 14px;
  }
  .topbar-stat { display: flex; align-items: center; gap: 6px; }
  .topbar-stat .dot {
    width: 10px; height: 10px; border-radius: 50%;
  }

  /* --- Layout --- */
  .layout {
    display: flex;
    min-height: calc(100vh - 57px);
  }

  /* --- Sidebar --- */
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-section {
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-top: 8px;
  }
  .sidebar-item {
    padding: 10px 16px 10px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .sidebar-item:hover { background: var(--surface2); }
  .sidebar-item.active {
    background: var(--surface2);
    border-left-color: var(--accent);
  }
  .sidebar-item .status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .sidebar-item .label { flex: 1; }
  .sidebar-item .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  /* --- Main Content --- */
  .main {
    flex: 1;
    padding: 32px;
    overflow-y: auto;
    max-width: 960px;
  }

  /* --- Overview Cards --- */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .overview-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .overview-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .overview-card .number {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .overview-card .card-label {
    font-size: 13px;
    color: var(--text-dim);
  }
  .overview-card .progress-bar {
    margin-top: 12px;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .overview-card .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  /* --- Section Page --- */
  .section-header {
    margin-bottom: 24px;
  }
  .section-header h2 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .section-header p {
    color: var(--text-dim);
    font-size: 14px;
  }

  .req-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;

  .req-card:hover { border-color: var(--accent); }
  .req-card-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }
  .req-card-header .chevron {
    color: var(--text-dim);
    transition: transform 0.2s;
    font-size: 12px;
    width: 16px;
    text-align: center;
  }
  .req-card.open .chevron { transform: rotate(90deg); }
  .req-id {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 4px;
    color: var(--accent);
    font-weight: 600;
    flex-shrink: 0;
  }
  .req-title { flex: 1; font-size: 14px; font-weight: 500; }
  .req-status {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .status-done { background: rgba(52, 211, 153, 0.15); color: var(--green); }
  .status-partial { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
  .status-missing { background: rgba(248, 113, 113, 0.15); color: var(--red); }
  .status-process { background: rgba(167, 139, 250, 0.15); color: var(--purple); }

  .req-card-body {
    display: none;
    padding: 0 20px 20px 20px;
    border-top: 1px solid var(--border);
  }
  .req-card.open .req-card-body { display: block; padding-top: 16px; }

  .req-detail-section {
    margin-bottom: 16px;
  }
  .req-detail-section:last-child { margin-bottom: 0; }
  .req-detail-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .req-detail-text {
    font-size: 14px;
    line-height: 1.7;
  }
  .req-detail-text code {
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
  }
  .req-detail-text ul {
    padding-left: 20px;
    margin-top: 4px;
  }
  .req-detail-text li { margin-bottom: 4px; }

  .what-you-have {
    background: rgba(52, 211, 153, 0.08);
    border-left: 3px solid var(--green);
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    margin-top: 8px;
  }
  .what-you-need {
    background: rgba(248, 113, 113, 0.08);
    border-left: 3px solid var(--red);
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    margin-top: 8px;
  }
  .what-you-partial {
    background: rgba(251, 191, 36, 0.08);
    border-left: 3px solid var(--yellow);
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    margin-top: 8px;
  }

  /* --- Phase Timeline --- */
  .phase-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .phase-card h3 {
    font-size: 18px;
    margin-bottom: 4px;
  }
  .phase-card .phase-desc {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 16px;
  }
  .phase-step {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-top: 1px solid var(--surface2);
  }
  .phase-step-num {
    width: 28px; height: 28px;
    background: var(--surface2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--accent);
  }
  .phase-step-content { flex: 1; }
  .phase-step-title { font-size: 14px; font-weight: 600; }
  .phase-step-detail { font-size: 13px; color: var(--text-dim); margin-top: 2px; }

  /* --- Filter bar --- */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

  /* --- Scrollbar --- */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* --- Responsive --- */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { padding: 16px; }
    .overview-grid { grid-template-columns: 1fr 1fr; }
  }

  /* ── Print Styles ── */
  @media print {
    @page { margin: 0.75in; size: letter; }
    body { background: #fff !important; color: #111 !important; font-size: 11pt; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .topbar { position: static; background: #fff !important; border-bottom: 2px solid #111; }
    .topbar button, .topbar .actions, .topbar-stats { display: none !important; }
    * { max-height: none !important; overflow: visible !important; }
    [style*="max-height"] { max-height: none !important; }
    [style*="overflow"] { overflow: visible !important; }
    .gate-card, .gate-detail, .gate-section { break-inside: avoid; }
    .gate-details, .gate-body, .collapsible-content { display: block !important; }
    .sidebar { display: none !important; }
    .main { max-width: 100%; padding: 0; }
    :root {
      --bg: #fff; --surface: #fff; --surface2: #f8fafc;
      --border: #d1d5db; --text: #111; --text-dim: #4b5563;
    }
  }
  .section-nav{background:#050810;border-bottom:1px solid #1e293b;display:flex;padding:0 24px}
  .section-nav a{color:#94a3b8;text-decoration:none;padding:10px 20px;border-bottom:2px solid transparent;font-size:13px;font-weight:600;letter-spacing:.5px;transition:all .2s}
  .section-nav a:hover{color:#e2e8f0;background:rgba(255,255,255,.03)}
  .section-nav a.active{color:#38bdf8;border-bottom-color:#38bdf8}
</style>

let currentView = 'overview';
let currentFilter = 'all';

function countByStatus(items) {
  const counts = { done: 0, partial: 0, missing: 0, process: 0 };
  items.forEach(i => counts[i.status]++);
  return counts;
}

function renderTopbarStats() {
  const all = [...rpocRequirements, ...securityGates, ...appOwnerRequirements];
  const c = countByStatus(all);
  document.getElementById('topbar-stats').innerHTML = `
    <div class="topbar-stat"><div class="dot" style="background:${STATUS_COLORS.done}"></div>${c.done} Done</div>
    <div class="topbar-stat"><div class="dot" style="background:${STATUS_COLORS.partial}"></div>${c.partial} Partial</div>
    <div class="topbar-stat"><div class="dot" style="background:${STATUS_COLORS.missing}"></div>${c.missing} Missing</div>
    <div class="topbar-stat"><div class="dot" style="background:${STATUS_COLORS.process}"></div>${c.process} Process</div>
  `;
}

function renderSidebar() {
  const sections = [
    { label: 'Overview', items: [{ id: 'overview', title: 'Dashboard', status: null }, { id: 'action-plan', title: 'Action Plan', status: null }] },
    { label: 'RPOC Requirements (24)', items: rpocRequirements.map(r => ({ id: `rpoc-${r.id}`, title: `${r.id}: ${r.title}`, status: r.status, viewId: 'rpoc' })) },
    { label: 'Security Gates (8)', items: securityGates.map(r => ({ id: `gate-${r.id}`, title: `${r.id}: ${r.title}`, status: r.status, viewId: 'gates' })) },
    { label: 'App Owner Reqs (19)', items: appOwnerRequirements.map(r => ({ id: `appo-${r.id}`, title: `${r.id}: ${r.title}`, status: r.status, viewId: 'appo' })) }
  ];

  let html = '';
  sections.forEach(s => {
    html += `<div class="sidebar-section">${s.label}</div>`;
    s.items.forEach(item => {
      const isActive = currentView === item.id || currentView === item.viewId;
      const dotColor = item.status ? STATUS_COLORS[item.status] : 'transparent';
      html += `<div class="sidebar-item ${isActive ? 'active' : ''}" onclick="navigate('${item.viewId || item.id}', '${item.id}')">
        <div class="status-dot" style="background:${dotColor}"></div>
        <div class="label">${item.title}</div>
      </div>`;
    });
  });
  document.getElementById('sidebar').innerHTML = html;
}

function renderFilterBar(items) {
  const c = countByStatus(items);
  return `<div class="filter-bar">
    <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All (${items.length})</button>

    <button class="filter-btn ${currentFilter === 'process' ? 'active' : ''}" onclick="setFilter('process')">Process (${c.process})</button>
  </div>`;
}

      <div class="req-detail-label">RAISE 2.0 Requirement</div>
      <div class="req-detail-text">${r.raise}</div>
    </div>`;

  if (r.have) {
    bodyHtml += `<div class="req-detail-section">
      <div class="req-detail-label">What You Have</div>
      <div class="what-you-have">${r.have}</div>
    </div>`;
  }
  if (r.need) {
    bodyHtml += `<div class="req-detail-section">
      <div class="req-detail-label">What You Need</div>

    </div>`;
  }
  if (r.tool) {

      <div class="req-detail-label">Effort</div>
      <div class="req-detail-text">${r.effort}</div>
    </div>`;
  }

    bodyHtml += `<div class="req-detail-section">
      <div class="req-detail-label">NIST 800-53 Controls</div>
      <div class="req-detail-text">${r.nist.map(n => `<code>${n}</code>`).join(' ')}</div>
    </div>`;
  }

  return `<div class="req-card ${isOpen ? 'open' : ''}" id="card-${r.id}" data-status="${r.status}">
    <div class="req-card-header" onclick="toggleCard('${r.id}')">
      <span class="chevron">&#9654;</span>

      <span class="req-status ${statusClass}">${STATUS_LABELS[r.status]}</span>

    <div class="req-card-body">${bodyHtml}</div>

  const gatePct = Math.round((gateCounts.done / securityGates.length) * 100);

  return `

        <div class="card-label">RPOC Requirements (${rpocCounts.done}/${rpocRequirements.length})</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${rpocPct}%;background:var(--green)"></div></div>
      </div>
      <div class="overview-card" onclick="navigate('gates')">
        <div class="number" style="color:${gatePct >= 70 ? 'var(--green)' : gatePct >= 40 ? 'var(--yellow)' : 'var(--red)'}">${gatePct}%</div>
        <div class="card-label">Security Gates (${gateCounts.done}/${securityGates.length})</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${gatePct}%;background:var(--yellow)"></div></div>
      </div>
      <div class="overview-card" onclick="navigate('appo')">
        <div class="number" style="color:${appoPct >= 70 ? 'var(--green)' : appoPct >= 40 ? 'var(--yellow)' : 'var(--red)'}">${appoPct}%</div>
        <div class="card-label">App Owner Reqs (${appoCounts.done}/${appOwnerRequirements.length})</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${appoPct}%;background:var(--yellow)"></div></div>
      </div>
      <div class="overview-card" onclick="navigate('action-plan')">
        <div class="number" style="color:${totalPct >= 70 ? 'var(--green)' : totalPct >= 40 ? 'var(--yellow)' : 'var(--red)'}">${totalPct}%</div>
        <div class="card-label">Overall (${totalDone}/${totalAll})</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${totalPct}%;background:var(--accent)"></div></div>
      </div>

    <div class="section-header" style="margin-top:16px">
      <h2>What is RAISE 2.0 / RPOC?</h2>
    </div>
    <div class="phase-card">
      <p style="margin-bottom:12px"><strong>RAISE</strong> (Rapid Assess and Incorporate Software Engineering) is the Department of Navy's framework for rapidly deploying containerized applications to production under an existing ATO — without each app needing its own separate ATO.</p>
      <p style="margin-bottom:12px">An <strong>RPOC</strong> (RAISE Platform of Choice) is a DevSecOps Platform (DSOP) that has been officially designated by an Authorizing Official (AO) as meeting all RAISE requirements. Once your platform is an RPOC:</p>
      <ul style="padding-left:20px;margin-bottom:12px">
        <li>Applications can be deployed to production <strong>without a separate ATO</strong></li>

function renderQuickStatus(label, items, counts) {
  const missing = items.filter(i => i.status === STATUS.MISSING || i.status === STATUS.PROCESS);
  const partial = items.filter(i => i.status === STATUS.PARTIAL);
  let html = `<div class="phase-card" style="margin-bottom:12px">
    <h3 style="font-size:16px;margin-bottom:8px">${label}</h3>
    <div style="display:flex;gap:16px;margin-bottom:12px;font-size:13px">
      <span style="color:var(--green)">${counts.done} Done</span>
      <span style="color:var(--yellow)">${counts.partial} Partial</span>
      <span style="color:var(--red)">${counts.missing} Missing</span>
      <span style="color:var(--purple)">${counts.process} Process</span>
    </div>`;
  if (missing.length > 0) {
    html += `<div style="font-size:13px;color:var(--text-dim);margin-bottom:6px">Needs attention:</div>`;
    missing.forEach(i => {
      html += `<div style="font-size:13px;padding:4px 0;display:flex;gap:8px;align-items:center;cursor:pointer" onclick="navigateToItem('${i.id}')">
        <div class="status-dot" style="background:${STATUS_COLORS[i.status]};width:8px;height:8px;border-radius:50%;flex-shrink:0"></div>
        <span style="color:var(--accent)">${i.id}</span> ${i.title}
      </div>`;
    });
  }
  if (partial.length > 0) {
    partial.forEach(i => {
      html += `<div style="font-size:13px;padding:4px 0;display:flex;gap:8px;align-items:center;cursor:pointer" onclick="navigateToItem('${i.id}')">
        <div class="status-dot" style="background:${STATUS_COLORS[i.status]};width:8px;height:8px;border-radius:50%;flex-shrink:0"></div>
        <span style="color:var(--accent)">${i.id}</span> ${i.title}
      </div>`;
    });
  }
  html += '</div>';
  return html;
}

function renderRequirementList(title, desc, items, scrollToId) {
  const filtered = currentFilter === 'all' ? items : items.filter(i => i.status === currentFilter);
  return `
    <div class="section-header">
      <h2>${title}</h2>
      <p>${desc}</p>
    </div>
    ${renderFilterBar(items)}
    ${filtered.map(r => renderReqCard(r, scrollToId)).join('')}
  `;
}

function renderActionPlan() {
  let html = `
    <div class="section-header">
      <h2>Action Plan — DSOP to RPOC</h2>
      <p>Three phases to get your SRE platform designated as an RPOC</p>
    </div>`;

  phases.forEach((phase, pi) => {
    html += `<div class="phase-card" style="border-left:4px solid ${phase.color}">
      <h3 style="color:${phase.color}">Phase ${pi + 1}: ${phase.title.replace(/^Phase \d: /, '')}</h3>
      <div class="phase-desc">${phase.desc}</div>
      ${phase.steps.map((s, si) => `
        <div class="phase-step">
          <div class="phase-step-num">${si + 1}</div>
          <div class="phase-step-content">
            <div class="phase-step-title">${s.title}</div>
            <div class="phase-step-detail">${s.detail}</div>
          </div>
        </div>
      `).join('')}
    </div>`;
  });
  return html;
}

function render(scrollToId) {
  let html = '';
  switch (currentView) {
    case 'overview':
      html = renderOverview(); break;
    case 'action-plan':
      html = renderActionPlan(); break;
    case 'rpoc':
      html = renderRequirementList('RPOC Requirements', 'The 24 mandatory requirements for RAISE Platform of Choice designation (Table 2 of RAISE 2.0).', rpocRequirements, scrollToId); break;
    case 'gates':
      html = renderRequirementList('Security Gates', 'The 8 mandatory CI/CD pipeline security gates (Table 5 of RAISE 2.0). Every release must pass all gates.', securityGates, scrollToId); break;
    case 'appo':
      html = renderRequirementList('Application Owner Requirements', 'The 19 requirements for each application team deploying on the RPOC (Table 4 of RAISE 2.0).', appOwnerRequirements, scrollToId); break;
  }
  document.getElementById('main').innerHTML = html;
  renderSidebar();
  renderTopbarStats();

  if (scrollToId) {
    setTimeout(() => {
      const el = document.getElementById('card-' + scrollToId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 50);
  }
}

// ============================================================
// INTERACTIONS
// ============================================================

function navigate(view, itemId) {
  currentView = view;
  currentFilter = 'all';
  const scrollToId = itemId ? itemId.replace(/^(rpoc|gate|appo)-/, '') : null;
  render(scrollToId);
}

function navigateToItem(id) {
  if (id.startsWith('RPOC')) { currentView = 'rpoc'; }
  else if (id.startsWith('GATE')) { currentView = 'gates'; }
  else if (id.startsWith('APPO')) { currentView = 'appo'; }
  currentFilter = 'all';
  render(id);
}

function toggleCard(id) {
  const el = document.getElementById('card-' + id);
  if (el) el.classList.toggle('open');
}

function setFilter(f) {
  currentFilter = f;
  render();
}

// ============================================================
// INIT
// ============================================================
render();
</script>
<script src="js/sre-api.js"></script>
<script>
// Live data from SRE Platform API — RAISE requirements status
(function(){
  if(typeof SreApi==='undefined'||typeof rpocRequirements==='undefined')return;
  SreApi.checkConnection().then(function(isLive){
    if(!isLive)return;
    SreApi.fetchFromSRE('/api/compliance/raise/status').then(function(result){
      if(!result.ok||!result.data||!result.data.requirements)return;
      var liveReqs=result.data.requirements;
      var liveMap={};
      liveReqs.forEach(function(r){ liveMap[r.id]=r; });
      var statusFromApi={'auto-verified':'done','failed':'missing','manual':'process'};
      rpocRequirements.forEach(function(req){
        var lr=liveMap[req.id];
        if(lr){
          var mapped=statusFromApi[lr.status];
          if(mapped&&mapped!==req.status){ req.status=mapped; req._live=true; }
          if(lr.evidence){ req._liveEvidence=lr.evidence; }
        }
      });
      render();
      SreApi.setDataSource('live');
    });
  });
})();
</script>
