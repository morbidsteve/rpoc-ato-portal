<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAISE 2.0 — Document Viewer</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1e293b;
    --surface3: #334155;
    --border: #374151;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
    --accent: #38bdf8;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --purple: #a78bfa;
    --blue: #60a5fa;
    --cyan: #22d3ee;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Topbar */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .back-btn {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--surface2); color: var(--text);
    font-size: 18px; text-decoration: none; transition: all 0.15s;
    border: 1px solid var(--border); flex-shrink: 0;
  }
  .back-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); text-decoration: none; }
  .topbar-logo {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 13px; color: #fff;
  }
  .topbar h1 { font-size: 17px; font-weight: 700; }
  .topbar h1 span { color: var(--accent); }
  .topbar-right { display: flex; gap: 10px; align-items: center; }
  .btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 13px; font-weight: 600; padding: 8px 16px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--purple)); color: #fff; border: none; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(56,189,248,0.3); }

  /* Content */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 32px;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-size: 16px;
  }
  .loading .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error {
    text-align: center;
    padding: 80px 20px;
    color: var(--red);
  }
  .error h2 { margin-bottom: 8px; }
  .error p { color: var(--text-dim); }

  /* Markdown rendered content */
  .md-content h1 { font-size: 28px; font-weight: 800; color: #fff; margin: 32px 0 16px; padding-bottom: 8px; border-bottom: 2px solid var(--accent); }
  .md-content h1:first-child { margin-top: 0; }
  .md-content h2 { font-size: 22px; font-weight: 700; color: #fff; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .md-content h3 { font-size: 18px; font-weight: 600; color: var(--accent); margin: 24px 0 8px; }
  .md-content h4 { font-size: 15px; font-weight: 600; color: var(--text); margin: 20px 0 8px; }
  .md-content h5, .md-content h6 { font-size: 14px; font-weight: 600; color: var(--text-dim); margin: 16px 0 6px; }
  .md-content p { margin: 10px 0; line-height: 1.7; color: var(--text); }
  .md-content ul, .md-content ol { margin: 10px 0 10px 24px; line-height: 1.7; }
  .md-content li { margin: 4px 0; }
  .md-content strong { color: #fff; }
  .md-content em { color: var(--yellow); font-style: italic; }
  .md-content code {
    background: var(--surface2); padding: 2px 6px; border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
    font-size: 0.9em; color: var(--cyan);
  }
  .md-content pre {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin: 16px 0;
    overflow-x: auto; line-height: 1.5;
  }
  .md-content pre code { background: none; padding: 0; color: var(--text); font-size: 13px; }
  .md-content blockquote {
    border-left: 3px solid var(--accent); margin: 16px 0;
    padding: 8px 16px; background: var(--surface);
    border-radius: 0 8px 8px 0; color: var(--text-dim);
  }
  .md-content a { color: var(--accent); text-decoration: none; }
  .md-content a:hover { text-decoration: underline; }
  .md-content hr { border: none; height: 1px; background: var(--border); margin: 24px 0; }
  .md-content img { max-width: 100%; border-radius: 8px; margin: 16px 0; }

  /* Tables */
  .md-content table {
    width: 100%; border-collapse: collapse; margin: 16px 0;
    background: var(--surface); border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .md-content th {
    background: var(--surface2); color: #fff; font-weight: 600;
    text-align: left; padding: 10px 14px; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 2px solid var(--border);
  }
  .md-content td {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    font-size: 14px; vertical-align: top;
  }
  .md-content tr:last-child td { border-bottom: none; }
  .md-content tr:hover td { background: rgba(56,189,248,0.04); }

  /* Doc info bar */
  .doc-info {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .doc-info .path {
    font-family: 'SF Mono', Consolas, monospace;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 4px;
  }

  /* Print Styles */
  @media print {
    :root {
      --bg: #fff; --surface: #fff; --surface2: #f8f9fa; --surface3: #e9ecef;
      --border: #dee2e6; --text: #212529; --text-dim: #495057; --text-muted: #6c757d;
      --accent: #0066cc;
    }
    body { background: #fff; color: #212529; }
    .topbar { position: static; border-bottom: 2px solid #000; }
    .topbar-logo { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    .back-btn, .topbar-right { display: none; }
    .md-content h1 { color: #000; border-bottom-color: #000; }
    .md-content h2 { color: #000; }
    .md-content h3 { color: #333; }
    .md-content strong { color: #000; }
    .md-content em { color: #664; }
    .md-content code { background: #f0f0f0; color: #333; }
    .md-content pre { background: #f8f9fa; border: 1px solid #ddd; }
    .md-content table { border: 1px solid #ccc; }
    .md-content th { background: #eee !important; color: #000; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    .md-content td { border-color: #ddd; }
    .doc-info { border: 1px solid #ddd; }
  }

  @media (max-width: 768px) {
    .topbar { padding: 12px 16px; }
    .container { padding: 20px 16px; }
    .topbar h1 { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="raise-portal.html" class="back-btn" title="Back to Portal" aria-label="Back to portal">&larr;</a>
    <div class="topbar-logo">R2</div>
    <h1><span>RAISE 2.0</span> &mdash; <span id="docTitle">Document</span></h1>
  </div>
  <div class="topbar-right">
    <button class="btn" onclick="window.print()">&#128424; Print / PDF</button>
  </div>
</div>

<div class="container">
  <div class="doc-info">
    <span>Source: <span class="path" id="docPath"></span></span>
  </div>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      Loading document...
    </div>
  </div>
</div>

<script>
// Simple Markdown to HTML renderer (no dependencies)
function renderMarkdown(md) {
  var html = md;

  // Escape HTML in code blocks first
  var codeBlocks = [];
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
    codeBlocks.push('<pre><code>' + escapeHtml(code.trim()) + '</code></pre>');
    return '\x00CODE' + (codeBlocks.length - 1) + '\x00';
  });

  var inlineCodes = [];
  html = html.replace(/`([^`\n]+)`/g, function(m, code) {
    inlineCodes.push('<code>' + escapeHtml(code) + '</code>');
    return '\x00INLINE' + (inlineCodes.length - 1) + '\x00';
  });

  // Tables
  html = html.replace(/^(\|.+\|)\n(\|[\s:|-]+\|)\n((?:\|.+\|\n?)+)/gm, function(m, header, sep, body) {
    var ths = header.split('|').filter(function(c){ return c.trim(); }).map(function(c){
      return '<th>' + c.trim() + '</th>';
    }).join('');
    var rows = body.trim().split('\n').map(function(row) {
      var tds = row.split('|').filter(function(c){ return c.trim() !== ''; }).map(function(c){
        return '<td>' + c.trim() + '</td>';
      }).join('');
      return '<tr>' + tds + '</tr>';
    }).join('\n');
    return '<table><thead><tr>' + ths + '</tr></thead><tbody>' + rows + '</tbody></table>';
  });

  // Headings
  html = html.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
  html = html.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
  html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

  // Horizontal rules
  html = html.replace(/^---+$/gm, '<hr>');

  // Blockquotes
  html = html.replace(/^>\s+(.+)$/gm, '<blockquote>$1</blockquote>');

  // Bold and italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
  html = html.replace(/_(.+?)_/g, '<em>$1</em>');

  // Links (sanitize href to block javascript:, data:, vbscript: schemes)
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(m, text, url) {
    var scheme = url.trim().toLowerCase();
    if (/^(javascript|data|vbscript)\s*:/i.test(scheme)) {
      return '<a href="#">' + text + '</a>';
    }
    return '<a href="' + url + '">' + text + '</a>';
  });

  // Images
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

  // Unordered lists
  html = html.replace(/^(\s*)-\s+(.+)$/gm, function(m, indent, content) {
    return '<li>' + content + '</li>';
  });

  // Ordered lists
  html = html.replace(/^(\s*)\d+\.\s+(.+)$/gm, function(m, indent, content) {
    return '<oli>' + content + '</oli>';
  });

  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li>.+<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Wrap consecutive <oli> in <ol>
  html = html.replace(/((?:<oli>.+<\/oli>\n?)+)/g, function(m) {
    return '<ol>' + m.replace(/<\/?oli>/g, function(tag) { return tag.replace('oli', 'li'); }) + '</ol>';
  });

  // Paragraphs — wrap non-tagged lines
  var lines = html.split('\n');
  var result = [];
  var inPara = false;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) {
      if (inPara) { result.push('</p>'); inPara = false; }
      continue;
    }
    if (/^<(h[1-6]|ul|ol|li|table|thead|tbody|tr|th|td|pre|blockquote|hr|div|img)/.test(line)) {
      if (inPara) { result.push('</p>'); inPara = false; }
      result.push(line);
    } else {
      if (!inPara) { result.push('<p>'); inPara = true; }
      result.push(line);
    }
  }
  if (inPara) result.push('</p>');
  html = result.join('\n');

  // Restore code blocks
  html = html.replace(/\x00CODE(\d+)\x00/g, function(m, idx) { return codeBlocks[parseInt(idx)]; });
  html = html.replace(/\x00INLINE(\d+)\x00/g, function(m, idx) { return inlineCodes[parseInt(idx)]; });

  return html;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Extract human-readable title from filename
function fileToTitle(filename) {
  var name = filename.split('/').pop().replace(/\.md$/, '');
  return name.split(/[-_]/).map(function(w) {
    if (w.length <= 2 && w === w.toUpperCase()) return w;
    return w.charAt(0).toUpperCase() + w.slice(1);
  }).join(' ');
}

// Load and render the document
(function() {
  var params = new URLSearchParams(window.location.search);
  var doc = params.get('doc');

  if (!doc) {
    document.getElementById('content').innerHTML =
      '<div class="error"><h2>No document specified</h2><p>Use ?doc=path/to/file.md to load a document.</p></div>';
    return;
  }

  // Validate doc parameter: must start with "compliance/" and must not contain ".." path traversal
  if (!doc.startsWith('compliance/') || doc.indexOf('..') !== -1) {
    document.getElementById('content').innerHTML =
      '<div class="error"><h2>Invalid document path</h2><p>Document path must start with <code>compliance/</code> and must not contain path traversal sequences.</p></div>';
    return;
  }

  var title = params.get('title') || fileToTitle(doc);
  document.getElementById('docTitle').textContent = title;
  document.getElementById('docPath').textContent = doc;
  document.title = 'RAISE 2.0 — ' + title;

  fetch(doc).then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.text();
  }).then(function(md) {
    var rendered = renderMarkdown(md);
    document.getElementById('content').innerHTML = '<div class="md-content">' + rendered + '</div>';
  }).catch(function(err) {
    document.getElementById('content').innerHTML =
      '<div class="error"><h2>Could not load document</h2>' +
      '<p>' + escapeHtml(doc) + '</p>' +
      '<p style="margin-top:8px;">Error: ' + escapeHtml(err.message) + '</p></div>';
  });
})();
</script>

</body>
</html>
