<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAISE 2.0 — ATO Controls Tracker</title>
<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --border: #475569;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --accent: #38bdf8;
  --green: #34d399;
  --yellow: #fbbf24;
  --red: #f87171;
  --orange: #fb923c;
  --purple: #a78bfa;
  --blue: #60a5fa;
  --gray: #64748b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6;
}

/* ── Topbar ── */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 20px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0;
  z-index: 200; flex-wrap: wrap; gap: 10px;
}
.back-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:var(--surface-hover);color:var(--text);font-size:18px;text-decoration:none;transition:all .15s;border:1px solid var(--border);flex-shrink:0}
.back-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);text-decoration:none}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.topbar h1 { font-size: 16px; font-weight: 700; white-space: nowrap; }
.topbar h1 span { color: var(--accent); }
.topbar-pct { font-size: 20px; font-weight: 800; color: var(--accent); }
.topbar-progress { width: 160px; height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.topbar-progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--green), var(--accent)); transition: width .4s; }
.topbar-stats { display: flex; gap: 14px; font-size: 12px; flex-wrap: wrap; }
.topbar-stat { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.topbar-stat .dot { width: 8px; height: 8px; border-radius: 50%; }
.topbar-stat .v { font-weight: 700; }
.topbar-actions { display: flex; gap: 6px; }
.btn {
  padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); font-size: 12px;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn:hover { background: var(--border); border-color: var(--accent); }
.btn-accent { background: var(--accent); color: #0f172a; border-color: var(--accent); font-weight: 600; }
.btn-accent:hover { background: #7dd3fc; }

/* ── Layout ── */
.layout { display: flex; min-height: calc(100vh - 50px); }

/* ── Sidebar ── */
.sidebar {
  width: 250px; background: var(--surface); border-right: 1px solid var(--border);
  padding: 10px 0; overflow-y: auto; flex-shrink: 0;
  position: sticky; top: 50px; height: calc(100vh - 50px);
}
.sidebar-hdr { padding: 6px 14px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
.sb-item {
  padding: 7px 10px 7px 14px; cursor: pointer; display: flex;
  align-items: center; gap: 7px; font-size: 12px;
  transition: background .15s; border-left: 3px solid transparent;
}
.sb-item:hover { background: var(--surface2); }
.sb-item.active { background: var(--surface2); border-left-color: var(--accent); }
.sb-item .fid { font-weight: 700; color: var(--accent); width: 26px; flex-shrink: 0; font-size: 11px; }
.sb-item .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-item .fcnt { font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
.sb-mini { width: 44px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.sb-mini-fill { height: 100%; border-radius: 2px; background: var(--green); transition: width .3s; }

/* ── Main ── */
.main { flex: 1; padding: 20px 28px; overflow-y: auto; }

/* ── Dashboard Cards ── */
.dash-row { display: grid; grid-template-columns: repeat(6,1fr); gap: 10px; margin-bottom: 20px; }
.dash-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px; text-align: center; transition: border-color .2s;
}
.dash-card:hover { border-color: var(--accent); }
.dash-card .num { font-size: 28px; font-weight: 800; }
.dash-card .lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* ── Toolbar ── */
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.search-box {
  flex: 1; min-width: 180px; padding: 7px 12px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 13px; outline: none;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text-dim); }
.filter-group { display: flex; gap: 3px; flex-wrap: wrap; }
.fbtn {
  padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim); font-size: 11px;
  cursor: pointer; transition: all .15s;
}
.fbtn:hover { border-color: var(--text-dim); color: var(--text); }
.fbtn.active { border-color: var(--accent); color: var(--accent); background: rgba(56,189,248,.1); }
.sort-ctl { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-dim); }
.sort-ctl button { padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 10px; cursor: pointer; }
.sort-ctl button.active { border-color: var(--accent); color: var(--accent); }

/* ── Family Header ── */
.fam-hdr { margin-bottom: 16px; }
.fam-hdr h2 { font-size: 20px; font-weight: 700; }
.fam-hdr h2 .fhi { color: var(--accent); }
.fam-hdr p { color: var(--text-dim); font-size: 13px; }
.fam-stats { display: flex; gap: 14px; margin-top: 8px; font-size: 11px; }
.fam-stats .fs { display: flex; align-items: center; gap: 3px; }
.fam-stats .fs .dot { width: 7px; height: 7px; border-radius: 50%; }

/* ── Control Card ── */
.cc { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; overflow: hidden; transition: border-color .2s; }
.cc:hover { border-color: var(--accent); }
.cc-hdr { padding: 11px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
.cc-id { font-weight: 700; font-size: 13px; color: var(--accent); width: 72px; flex-shrink: 0; font-family: 'SF Mono','Consolas',monospace; }
.cc-title { flex: 1; font-size: 13px; font-weight: 500; }
.badge { padding: 2px 9px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; flex-shrink: 0; }
.s-implemented { background: rgba(52,211,153,.15); color: var(--green); }
.s-inherited { background: rgba(96,165,250,.15); color: var(--blue); }
.s-planned { background: rgba(251,191,36,.15); color: var(--yellow); }
.s-na { background: rgba(100,116,139,.15); color: var(--gray); }
.s-gap { background: rgba(248,113,113,.15); color: var(--red); }
.chev { width: 18px; height: 18px; color: var(--text-dim); transition: transform .2s; flex-shrink: 0; }
.cc.open .chev { transform: rotate(90deg); }
.cc-det { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); }
.cc.open .cc-det { display: block; }
.dg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
.df { display: flex; flex-direction: column; gap: 3px; }
.df.full { grid-column: 1/-1; }
.dl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--text-dim); }
.di, .ds, .dt {
  padding: 7px 10px; border-radius: 5px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 12px;
  font-family: inherit; outline: none; transition: border-color .2s;
}
.di:focus, .ds:focus, .dt:focus { border-color: var(--accent); }
.dt { resize: vertical; min-height: 60px; line-height: 1.5; }
.ds { cursor: pointer; }
.ds option { background: var(--surface); }

/* ── Empty ── */
.empty { text-align: center; padding: 50px 20px; color: var(--text-dim); font-size: 14px; }

/* ── Toast ── */
.toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 18px; background: var(--surface); border: 1px solid var(--accent); border-radius: 7px; font-size: 12px; z-index: 999; opacity: 0; transform: translateY(8px); transition: all .3s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }

/* ── Print ── */
@media print {
  :root { --bg:#fff; --surface:#fff; --surface2:#f1f5f9; --border:#cbd5e1; --text:#0f172a; --text-dim:#475569; }
  body { background:#fff; color:#0f172a; font-size:11pt; }
  * { max-height: none !important; overflow: visible !important; }
  [style*="max-height"] { max-height: none !important; }
  [style*="overflow"] { overflow: visible !important; }
  @page { margin: 0.75in; size: letter; }
  .topbar { position:static; }
  .topbar-actions { display:none; }
  .sidebar { display:none; }
  .layout { display:block; }
  .main { max-width:100%; padding:12px; }
  .cc { break-inside:avoid; }
  .cc.open .cc-det { display:block; }
  .chev { display:none; }
  .toolbar { display:none; }
  .dash-row { grid-template-columns: repeat(3,1fr); }
}
@media (max-width:700px) {
  .sidebar { display:none; }
  .layout { display:block; }
  .dash-row { grid-template-columns: repeat(3,1fr); }
  .dg { grid-template-columns:1fr; }
}
::-webkit-scrollbar { width:7px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
</style>
</head>

{id:"AU-12(3)",t:"Audit Record Generation | Changes by Authorized Individuals",s:"implemented",d:"K8s audit policy logs all changes with authenticated user identity. Git commits provide change attribution.",p:"Platform Team",e:"K8s audit logs, Git history"}
]},

"CM":{n:"Configuration Management",c:[
{id:"CM-1",t:"Policy and Procedures",s:"implemented",d:"GitOps workflow IS the CM policy. All changes require Git PRs with review. Conventional commits enforced. Documented in CLAUDE.md.",p:"Platform Team",e:"CLAUDE.md, docs/architecture.md"},
{id:"CM-2",t:"Baseline Configuration",s:"implemented",d:"Git repository IS the authoritative baseline. Flux CD continuously reconciles cluster state to match. Any drift auto-corrected.",p:"Platform Team",e:"Git repo main branch, Flux Kustomizations"},
{id:"CM-2(2)",t:"Baseline Configuration | Automation Support for Accuracy and Currency",s:"implemented",d:"Flux CD reconciles every 10 minutes. Drift detected and corrected automatically. Reconciliation events logged.",p:"Platform Team",e:"Flux reconciliation logs, events"},
{id:"CM-2(3)",t:"Baseline Configuration | Retention of Previous Configurations",s:"implemented",d:"Full Git history provides complete audit trail of every configuration change with author, timestamp, and rationale.",p:"Platform Team",e:"Git log, GitHub PR history"},
{id:"CM-2(7)",t:"Baseline Configuration | Configure Systems and Components for High-Risk Areas",s:"implemented",d:"Kyverno restricted PSS profile for tenant namespaces. NeuVector enforce mode for production workloads.",p:"Platform Team",e:"Kyverno policies, NeuVector profiles"},
{id:"CM-3",t:"Configuration Change Control",s:"implemented",d:"All changes via Git PRs with required reviews. Conventional commits provide structured change descriptions. Flux provides deployment audit trail.",p:"Platform Team",e:"GitHub PR history, Git log, Flux events"},
{id:"CM-3(1)",t:"Configuration Change Control | Automated Documentation, Notification, and Prohibition of Changes",s:"implemented",d:"Flux automatically documents all deployments. AlertManager notifies on changes. Kyverno prohibits unauthorized manual changes.",p:"Platform Team",e:"Flux events, AlertManager, Kyverno"},
{id:"CM-3(2)",t:"Configuration Change Control | Testing, Validation, and Documentation",s:"implemented",d:"PR pipeline: lint, validate, policy tests, Helm template checks. Changes documented in conventional commit messages.",p:"Platform Team",e:"GitHub Actions, task lint, task validate"},
{id:"CM-4",t:"Impact Analysis",s:"implemented",d:"flux diff shows planned changes before apply. PR reviews assess impact. Staging environment for pre-prod validation.",p:"Platform Team",e:"flux diff output, PR review process"},
{id:"CM-5",t:"Access Restrictions for Change",s:"implemented",d:"GitHub branch protection requires PR reviews. Flux RBAC restricts who can modify platform resources. Kyverno prevents manual kubectl changes.",p:"Platform Team",e:"GitHub branch rules, Flux RBAC, Kyverno protect policies"},
{id:"CM-6",t:"Configuration Settings",s:"implemented",d:"Ansible DISA STIG roles (OS layer), RKE2 CIS benchmark profile (K8s layer), Kyverno policies (workload layer). Three-tier hardening.",p:"Platform Team",e:"Ansible roles, RKE2 config, 7 Kyverno ClusterPolicies"},
{id:"CM-7",t:"Least Functionality",s:"implemented",d:"Kyverno restricts capabilities, volume types, host access. NeuVector process whitelisting blocks unexpected executables.",p:"Platform Team",e:"Kyverno policies, NeuVector process profiles"},
{id:"CM-7(1)",t:"Least Functionality | Periodic Review",s:"implemented",d:"Kyverno background scanning continuously checks all resources against policies. PolicyReports updated in real-time.",p:"Platform Team",e:"Kyverno PolicyReports, background scan"},
{id:"CM-7(2)",t:"Least Functionality | Prevent Program Execution",s:"implemented",d:"NeuVector process profile whitelisting blocks unauthorized executables in containers. Read-only rootfs prevents binary injection.",p:"Platform Team",e:"NeuVector process rules, readOnlyRootFilesystem"},
{id:"CM-8",t:"System Component Inventory",s:"implemented",d:"Flux tracks all deployed K8s components. Harbor maintains image inventory with SBOMs (SPDX + CycloneDX). ~90 running pods tracked.",p:"Platform Team",e:"flux get all, Harbor project inventory"},
{id:"CM-8(1)",t:"System Component Inventory | Updates During Installation and Removal",s:"implemented",d:"Flux automatically updates component inventory on every reconciliation cycle (10 min).",p:"Platform Team",e:"Flux reconciliation events"},
{id:"CM-8(3)",t:"System Component Inventory | Automated Unauthorized Component Detection",s:"implemented",d:"Kyverno restrict-image-registries blocks images not from Harbor. NeuVector detects unauthorized processes.",p:"Platform Team",e:"Kyverno image registry policy, NeuVector alerts"},
{id:"CM-9",t:"Configuration Management Plan",s:"implemented",d:"GitOps-based CM plan documented in docs/architecture.md. CLAUDE.md defines standards. Session playbook defines build process.",p:"Platform Team",e:"docs/architecture.md, CLAUDE.md, docs/session-playbook.md"},
{id:"CM-10",t:"Software Usage Restrictions",s:"implemented",d:"All components are open-source (verified in docs/decisions.md ADRs). Kyverno disallow-latest-tag enforces version pinning.",p:"Platform Team",e:"docs/decisions.md, Kyverno policies"},
{id:"CM-11",t:"User-Installed Software",s:"implemented",d:"Kyverno restrict-image-registries allows only harbor.sre.internal. verify-image-signatures validates Cosign signatures on all pods.",p:"Platform Team",e:"Kyverno restrict-image-registries, verify-image-signatures"}
]},

{id:"CP-4(1)",t:"Contingency Plan Testing | Coordinate with Related Plans",s:"planned",d:"Coordinate DR testing with organizational exercises.",p:"Org/HR",e:""},
{id:"CP-6",t:"Alternate Storage Site",s:"implemented",d:"Velero backs up to S3-compatible storage (off-cluster, separate availability zone).",p:"Platform Team",e:"Velero BackupStorageLocation config"},
{id:"CP-6(1)",t:"Alternate Storage Site | Separation from Primary Site",s:"implemented",d:"Backup S3 bucket in separate AZ/region from primary cluster.",p:"Platform Team",e:"S3 bucket configuration"},
{id:"CP-6(3)",t:"Alternate Storage Site | Accessibility",s:"implemented",d:"S3 backup accessible from any cluster in the account for restore operations.",p:"Platform Team",e:"S3 access policy"},
{id:"CP-7",t:"Alternate Processing Site",s:"planned",d:"Need documented failover site or multi-cluster capability for DR.",p:"Platform Team",e:""},

{id:"CP-9",t:"System Backup",s:"implemented",d:"Velero schedules: daily (retain 7), weekly (retain 4), monthly (retain 3). All namespaces except kube-system, flux-system.",p:"Platform Team",e:"Velero Schedule manifests"},
{id:"CP-9(1)",t:"System Backup | Testing for Reliability and Integrity",s:"implemented",d:"Velero restore test CronJob restores to test namespace, validates, cleans up.",p:"Platform Team",e:"Velero restore-test CronJob results"},
{id:"CP-9(8)",t:"System Backup | Cryptographic Protection",s:"implemented",d:"Backups encrypted at rest in S3 (SSE-S3). Secrets encrypted in etcd before backup.",p:"Platform Team",e:"S3 encryption, etcd encryption config"},
{id:"CP-10",t:"System Recovery and Reconstitution",s:"implemented",d:"Velero restore for data. Flux re-bootstrap from Git for platform state. Documented in operator guide.",p:"Platform Team",e:"docs/operator-guide.md, scripts/bootstrap.sh"}
]},
"IA":{n:"Identification and Authentication",c:[
{id:"IA-1",t:"Policy and Procedures",s:"implemented",d:"Authentication policy enforced by Keycloak for all platform services. Policy documented.",p:"Platform Team",e:"Keycloak realm settings, docs/"},
{id:"IA-2",t:"Identification and Authentication (Organizational Users)",s:"implemented",d:"Keycloak SSO with MFA for all platform UIs. OIDC integration with K8s API server.",p:"Platform Team",e:"Keycloak SRE realm, 5 OIDC clients"},
{id:"IA-2(1)",t:"ID and Auth | Multi-Factor Authentication to Privileged Accounts",s:"implemented",d:"Keycloak MFA (TOTP) required for sre-admins group members.",p:"Platform Team",e:"Keycloak auth flow, sre-admins group config"},
{id:"IA-2(2)",t:"ID and Auth | Multi-Factor Authentication to Non-Privileged Accounts",s:"implemented",d:"Keycloak MFA configurable per group. Recommended for all users.",p:"Platform Team",e:"Keycloak authentication flow settings"},
{id:"IA-2(8)",t:"ID and Auth | Access to Accounts — Replay Resistant",s:"implemented",d:"OIDC tokens short-lived (5 min access, 30 min refresh) with nonce validation. OAuth2 Proxy validates token freshness.",p:"Platform Team",e:"OIDC token lifetime config"},
{id:"IA-2(12)",t:"ID and Auth | Acceptance of PIV Credentials",s:"planned",d:"Keycloak supports X.509/smart card auth for CAC/PIV. Needs DoD PKI trust chain configuration.",p:"Platform Team",e:""},
{id:"IA-3",t:"Device Identification and Authentication",s:"implemented",d:"Istio mTLS assigns SPIFFE identities (spiffe://cluster.local/ns/X/sa/Y) to every workload. Mutual authentication required.",p:"Platform Team",e:"Istio SPIFFE certificates, PeerAuthentication"},
{id:"IA-4",t:"Identifier Management",s:"implemented",d:"Keycloak manages human user identifiers with uniqueness enforcement. K8s ServiceAccounts provide workload identifiers.",p:"Platform Team",e:"Keycloak user management, ServiceAccount manifests"},
{id:"IA-4(4)",t:"Identifier Management | Identify User Status",s:"implemented",d:"Keycloak tracks account status: active, disabled, locked. Status visible in admin console and audit logs.",p:"Platform Team",e:"Keycloak admin console"},
{id:"IA-5",t:"Authenticator Management",s:"implemented",d:"Keycloak password policies enforced. cert-manager rotates TLS certificates. OpenBao rotates secrets. Multi-layer authenticator management.",p:"Platform Team",e:"Keycloak policy, cert-manager Certificates, OpenBao leases"},
{id:"IA-5(1)",t:"Authenticator Management | Password-Based Authentication",s:"implemented",d:"Keycloak enforces: min 12 chars, complexity (upper+lower+digit+special), 24 password history, 90-day expiry, no dictionary words.",p:"Platform Team",e:"Keycloak password policy configuration"},
{id:"IA-5(2)",t:"Authenticator Management | PKI-Based Authentication",s:"implemented",d:"cert-manager manages full PKI lifecycle: root CA, intermediate CA, workload certs. Auto-rotation before expiry.",p:"Platform Team",e:"cert-manager ClusterIssuers, Certificate resources"},
{id:"IA-5(6)",t:"Authenticator Management | Protection of Authenticators",s:"implemented",d:"All secrets stored in OpenBao (encrypted at rest). K8s Secrets encrypted in etcd. No plaintext credentials in Git.",p:"Platform Team",e:"OpenBao config, etcd encryption, .gitignore"},
{id:"IA-6",t:"Authentication Feedback",s:"implemented",d:"Keycloak obscures password input. Generic 'Invalid credentials' on failure (no user enumeration).",p:"Platform Team",e:"Keycloak login page behavior"},
{id:"IA-7",t:"Cryptographic Module Authentication",s:"implemented",d:"FIPS 140-2 validated modules: RKE2 BoringCrypto (Go FIPS), Rocky Linux 9 FIPS crypto-policies.",p:"Platform Team",e:"fips-mode-setup output, RKE2 FIPS flag"},
{id:"IA-8",t:"ID and Auth (Non-Organizational Users)",s:"implemented",d:"All external traffic must authenticate via Keycloak through Istio gateway ext-authz. No anonymous access.",p:"Platform Team",e:"Istio ext-authz config, OAuth2 Proxy"},
{id:"IA-8(1)",t:"ID and Auth | Acceptance of PIV Credentials from Other Agencies",s:"planned",d:"Keycloak federation supports external IdP trust. Needs PIV/CAC cross-agency configuration.",p:"Platform Team",e:""},
{id:"IA-8(2)",t:"ID and Auth | Acceptance of External Authenticators",s:"planned",d:"Keycloak supports SAML/OIDC federation for external authenticator acceptance.",p:"Platform Team",e:""},
{id:"IA-8(4)",t:"ID and Auth | Use of Defined Profiles",s:"implemented",d:"Standard OIDC profiles with well-defined claims used across all 5 platform OIDC clients.",p:"Platform Team",e:"OIDC client configurations in Keycloak"}
]},

// ═══════════════════════════════════════════════════════════════════════════════
// State & Persistence
// ═══════════════════════════════════════════════════════════════════════════════
const SK="ato-ctrl-v2";
const SL={implemented:"Implemented",inherited:"Inherited",planned:"Planned",na:"N/A",gap:"Gap"};
const SO=["implemented","inherited","planned","na","gap"];
const PO=["Platform Team","App Owner","Org/HR","Facility","Cloud Provider"];
let st={fam:"AC",flt:"all",q:"",srt:"id",edits:{}};

function load(){try{const s=localStorage.getItem(SK);if(s){const p=JSON.parse(s);if(p.edits)st.edits=p.edits;}}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify({edits:st.edits}));}catch(e){}}

function gc(id){
  const ed=st.edits[id]||{};
  for(const f of Object.values(D)){
    for(const c of f.c){
      if(c.id===id) return{...c,s:ed.s||c.s,d:ed.d!==undefined?ed.d:c.d,p:ed.p||c.p,e:ed.e!==undefined?ed.e:(c.e||"")};
    }
  }
  return null;
}

function uc(id,field,val){
  if(!st.edits[id])st.edits[id]={};
  st.edits[id][field]=val;
  save();
  rTop();rSb();
}

function allC(){const a=[];for(const f of Object.values(D))for(const c of f.c)a.push(gc(c.id));return a;}

function stats(cs){
  const cn={implemented:0,inherited:0,planned:0,na:0,gap:0};
  cs.forEach(c=>{cn[c.s]=(cn[c.s]||0)+1;});
  const t=cs.length,ad=cn.implemented+cn.inherited+cn.na;
  return{cn,t,ad,pct:t>0?Math.round(ad/t*100):0};
}

function fStats(k){const f=D[k];if(!f)return{cn:{},t:0,ad:0,pct:0};return stats(f.c.map(c=>gc(c.id)));}

// ═══════════════════════════════════════════════════════════════════════════════
// Rendering
// ═══════════════════════════════════════════════════════════════════════════════
function esc(s){return s?s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):""}

function rTop(){
  const s=stats(allC());
  document.getElementById("tpct").textContent=s.pct+"%";
  document.getElementById("tpf").style.width=s.pct+"%";
  document.getElementById("tst").innerHTML=[
    {l:"Total",v:s.t,c:"var(--accent)"},{l:"Implemented",v:s.cn.implemented,c:"var(--green)"},
    {l:"Inherited",v:s.cn.inherited,c:"var(--blue)"},{l:"Planned",v:s.cn.planned,c:"var(--yellow)"},
    {l:"N/A",v:s.cn.na,c:"var(--gray)"},{l:"Gap",v:s.cn.gap||0,c:"var(--red)"}
  ].map(x=>`<div class="topbar-stat"><span class="dot" style="background:${x.c}"></span><span class="v">${x.v}</span> ${x.l}</div>`).join("");
}

function rSb(){
  let h='<div class="sidebar-hdr">Control Families (20)</div>';
  Object.keys(D).forEach(k=>{
    const f=D[k],s=fStats(k),a=st.fam===k?"active":"";
    h+=`<div class="sb-item ${a}" onclick="selFam('${k}')">
      <span class="fid">${k}</span><span class="fname">${f.n}</span>
      <span class="fcnt">${s.t}</span>
      <div class="sb-mini"><div class="sb-mini-fill" style="width:${s.pct}%"></div></div></div>`;
  });
  document.getElementById("sb").innerHTML=h;
}

function rMn(){
  const f=D[st.fam];if(!f)return;
  const s=fStats(st.fam);
  let cs=f.c.map(c=>gc(c.id));
  if(st.flt!=="all")cs=cs.filter(c=>c.s===st.flt);
  if(st.q){const q=st.q.toLowerCase();cs=cs.filter(c=>c.id.toLowerCase().includes(q)||c.t.toLowerCase().includes(q)||c.d.toLowerCase().includes(q));}
  if(st.srt==="status"){const o={gap:0,planned:1,implemented:2,inherited:3,na:4};cs.sort((a,b)=>(o[a.s]||0)-(o[b.s]||0));}

  // Dashboard cards for this family
  let h=`<div class="dash-row">
    <div class="dash-card"><div class="num" style="color:var(--accent)">${s.t}</div><div class="lbl">Total Controls</div></div>
    <div class="dash-card"><div class="num" style="color:var(--green)">${s.cn.implemented||0}</div><div class="lbl">Implemented</div></div>
    <div class="dash-card"><div class="num" style="color:var(--blue)">${s.cn.inherited||0}</div><div class="lbl">Inherited</div></div>
    <div class="dash-card"><div class="num" style="color:var(--yellow)">${s.cn.planned||0}</div><div class="lbl">Planned</div></div>
    <div class="dash-card"><div class="num" style="color:var(--gray)">${s.cn.na||0}</div><div class="lbl">N/A</div></div>
    <div class="dash-card"><div class="num" style="color:var(--red)">${s.cn.gap||0}</div><div class="lbl">Gaps</div></div>
  </div>`;

  h+=`<div class="fam-hdr"><h2><span class="fhi">${st.fam}</span> — ${f.n}</h2>
    <p>${s.t} controls | ${s.pct}% addressed (implemented + inherited + N/A)</p></div>`;

  h+=`<div class="toolbar">
    <input class="search-box" type="text" placeholder="Search by ID, title, or keyword..." value="${esc(st.q)}" oninput="st.q=this.value;rMn()">
    <div class="filter-group">
      ${["all",...SO].map(x=>`<button class="fbtn ${st.flt===x?'active':''}" onclick="st.flt='${x}';rMn()">${x==='all'?'All':SL[x]}</button>`).join("")}
    </div>
    <div class="sort-ctl">Sort:
      <button class="${st.srt==='id'?'active':''}" onclick="st.srt='id';rMn()">ID</button>
      <button class="${st.srt==='status'?'active':''}" onclick="st.srt='status';rMn()">Status</button>
    </div></div>`;

  if(!cs.length){h+='<div class="empty">No controls match your filters.</div>';}
  else cs.forEach(c=>{
    const sOpts=SO.map(x=>`<option value="${x}" ${c.s===x?'selected':''}>${SL[x]}</option>`).join("");
    const pOpts=PO.map(x=>`<option value="${x}" ${c.p===x?'selected':''}>${x}</option>`).join("");
    h+=`<div class="cc" data-id="${c.id}">
      <div class="cc-hdr" onclick="this.parentElement.classList.toggle('open')">
        <span class="cc-id">${c.id}</span><span class="cc-title">${esc(c.t)}</span>
        <span class="badge s-${c.s}">${SL[c.s]}</span>
        <svg class="chev" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clip-rule="evenodd"/></svg>
      </div>
      <div class="cc-det"><div class="dg">
        <div class="df"><label class="dl">Status</label><select class="ds" onchange="uc('${c.id}','s',this.value);rMn()">${sOpts}</select></div>
        <div class="df"><label class="dl">Responsible Party</label><select class="ds" onchange="uc('${c.id}','p',this.value)">${pOpts}</select></div>
        <div class="df full"><label class="dl">Implementation Description</label><textarea class="dt" onchange="uc('${c.id}','d',this.value)">${esc(c.d)}</textarea></div>
        <div class="df full"><label class="dl">Evidence / Artifacts</label><input class="di" type="text" value="${esc(c.e)}" onchange="uc('${c.id}','e',this.value)" placeholder="e.g., compliance/oscal/ssp.json, Grafana dashboard URL"></div>
      </div></div></div>`;
  });
  document.getElementById("mn").innerHTML=h;
}

// Interactions

function selFam(k){st.fam=k;st.flt="all";st.q="";rSb();rMn();document.getElementById("mn").scrollTop=0;}
function xAll(){document.querySelectorAll(".cc").forEach(c=>c.classList.add("open"));}
function cAll(){document.querySelectorAll(".cc").forEach(c=>c.classList.remove("open"));}

function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);}

function doExport(){
  const all=allC(),s=stats(all);
  const out={
    metadata:{title:"RAISE 2.0 ATO Controls Tracker Export",baseline:"NIST 800-53 Rev 5 Moderate",
      exportDate:new Date().toISOString(),totalControls:s.t,
      implemented:s.cn.implemented,inherited:s.cn.inherited,planned:s.cn.planned,na:s.cn.na,gaps:s.cn.gap||0,percentAddressed:s.pct},
    controlFamilies:{}
  };
  Object.keys(D).forEach(k=>{
    out.controlFamilies[k]={name:D[k].n,controls:D[k].c.map(c=>{
      const x=gc(c.id);
      return{id:x.id,title:x.t,status:x.s,implementationDescription:x.d,responsibleParty:x.p,evidence:x.e};
    })};
  });
  const b=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
  const u=URL.createObjectURL(b);
  const a=document.createElement("a");a.href=u;
  a.download="ato-controls-"+new Date().toISOString().split("T")[0]+".json";
  a.click();URL.revokeObjectURL(u);
  toast("Exported "+s.t+" controls as JSON");
}

// Keyboard shortcuts
document.addEventListener("keydown",e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==="f"){const b=document.querySelector(".search-box");if(b){e.preventDefault();b.focus();}}
  if(e.key==="Escape"){st.q="";rMn();}
});
